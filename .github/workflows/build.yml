name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore
      - name: Unit Tests
        run: dotnet test --no-build --verbosity normal --filter "FullyQualifiedName!~End2End"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start regtest infrastructure
        run: node regtest/regtest.mjs start --profile boltz,delegate
        timeout-minutes: 20
      - name: Restore and build
        run: dotnet build
      # The live-rotation tests run in the isolated e2e-rotation[-recovery] jobs below: a real
      # rotation recreates arkd-wallet + restarts arkd, cascade-failing every test sharing this
      # stack. Run everything EXCEPT those (tagged RealRotation / RealRotationExpiry) here.
      - name: Run E2E tests
        run: dotnet test NArk.Tests.End2End --no-build --verbosity normal --filter "TestCategory!=RealRotation&TestCategory!=RealRotationExpiry"
        timeout-minutes: 15
      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker logs arkd > /tmp/arkd-logs.txt 2>&1 || true
          docker logs boltz > /tmp/boltz-logs.txt 2>&1 || true
          docker logs bitcoin > /tmp/bitcoin-logs.txt 2>&1 || true
          docker logs lnd > /tmp/lnd-logs.txt 2>&1 || true
          docker logs boltz-lnd > /tmp/boltz-lnd-logs.txt 2>&1 || true
          docker logs boltz-fulmine > /tmp/fulmine-logs.txt 2>&1 || true
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: /tmp/*-logs.txt
      - name: Stop infrastructure
        if: always()
        run: node regtest/regtest.mjs clean || true

  e2e-rotation:
    name: E2E Signer Rotation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The committed .env.regtest pins a fixed operator signer (S2) plus a pre-deprecated
      # signer (S1) for the main suite's sweeper test. That pin overrides the key
      # rotate-signer generates, so the rotation never takes effect (arkd keeps reporting
      # the pinned signer and the command times out). Drop both pins for this isolated job
      # so the stack boots on the compose default key, which is exactly the key
      # rotate-signer's DEFAULT_SIGNER_KEY expects to deprecate on the first rotation.
      - name: Unpin operator signer so rotate-signer can manage it
        run: sed -i -E '/^ARKD_WALLET_(SIGNER_KEY|DEPRECATED_SIGNER_KEYS)=/d' .env.regtest
      - name: Start regtest infrastructure
        run: node regtest/regtest.mjs start --profile boltz,delegate
        timeout-minutes: 20
      - name: Restore and build
        run: dotnet build
      - name: Run signer-rotation E2E tests
        run: dotnet test NArk.Tests.End2End --no-build --verbosity normal --filter "TestCategory=RealRotation"
        timeout-minutes: 15
      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker logs arkd > /tmp/arkd-logs.txt 2>&1 || true
          docker logs arkd-wallet > /tmp/arkd-wallet-logs.txt 2>&1 || true
          docker logs bitcoin > /tmp/bitcoin-logs.txt 2>&1 || true
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-rotation
          path: /tmp/*-logs.txt
      - name: Stop infrastructure
        if: always()
        run: node regtest/regtest.mjs clean || true

  e2e-rotation-recovery:
    name: E2E Signer Rotation Recovery Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Unpin the operator signer (see e2e-rotation) AND shorten the VTXO tree expiry to 120s so the
      # past-cutoff recovery test can watch a coin EXPIRE -> become recoverable -> re-enroll for a
      # recovery batch within the test, instead of waiting the committed 1h. The ~1500s lower bound in
      # .env.regtest only exists to stop nigiri's auto-miner sweeping the SHARED CLI wallet mid-suite;
      # this job self-funds via an arkd note and runs one test alone, so it doesn't apply.
      - name: Unpin signer + shorten VTXO expiry for the recovery test
        run: sed -i -E '/^ARKD_WALLET_(SIGNER_KEY|DEPRECATED_SIGNER_KEYS)=/d; s/^ARKD_VTXO_TREE_EXPIRY=.*/ARKD_VTXO_TREE_EXPIRY=120/' .env.regtest
      - name: Start regtest infrastructure
        run: node regtest/regtest.mjs start --profile boltz,delegate
        timeout-minutes: 20
      - name: Restore and build
        run: dotnet build
      - name: Run past-cutoff recovery E2E test
        run: dotnet test NArk.Tests.End2End --no-build --verbosity normal --filter "TestCategory=RealRotationExpiry"
        timeout-minutes: 15
      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker logs arkd > /tmp/arkd-logs.txt 2>&1 || true
          docker logs arkd-wallet > /tmp/arkd-wallet-logs.txt 2>&1 || true
          docker logs bitcoin > /tmp/bitcoin-logs.txt 2>&1 || true
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs-rotation-recovery
          path: /tmp/*-logs.txt
      - name: Stop infrastructure
        if: always()
        run: node regtest/regtest.mjs clean || true

  publish:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    needs: [build, e2e, e2e-rotation, e2e-rotation-recovery]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Pack
        run: dotnet pack -c Release -o dist/
      - name: Push to NuGet
        run: dotnet nuget push "dist/*.nupkg" --skip-duplicate -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
      - name: Tag per NuGet package
        run: |
          for nupkg in dist/*.nupkg; do
            nuspec=$(unzip -p "$nupkg" '*.nuspec')
            package_id=$(echo "$nuspec" | grep -oP '<id>\K[^<]+')
            version=$(echo "$nuspec" | grep -oP '<version>\K[^<]+')
            tag="${package_id}/${version}"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
            else
              echo "Tagging: $tag"
              git tag "$tag"
            fi
          done
          git push origin --tags

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          generate_release_notes: false
