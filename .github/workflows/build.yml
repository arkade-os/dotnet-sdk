name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore NArk.CI.slnf
      - name: Build
        run: dotnet build NArk.CI.slnf --no-restore
      - name: Unit Tests
        run: dotnet test NArk.CI.slnf --no-build --verbosity normal --filter "FullyQualifiedName!~End2End"

  e2e:
    needs: build
    uses: ./.github/workflows/e2e-core.yml

  e2e-swaps:
    needs: build
    uses: ./.github/workflows/e2e-swaps.yml

  e2e-recovery:
    needs: build
    uses: ./.github/workflows/e2e-recovery.yml

  e2e-rotation:
    needs: build
    uses: ./.github/workflows/e2e-rotation.yml

  arkade-e2e:
    name: Arkade E2E Tests (emulator)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Start regtest infrastructure (with solver)
        # `solver` pulls in `ark` (arkd) + `emulator`, brings up the mock pricefeed + solver, and runs
        # solver-init (fund + mint asset + register pairs) so the swap fulfill E2E has a live market.
        # `boltz` adds fulmine (:7003) — the funding endpoint the shared test harness uses to top up
        # wallets. EMULATOR_SECRET_KEY comes from regtest/.env.defaults (deterministic).
        run: node regtest/regtest.mjs start --profile solver,boltz
        timeout-minutes: 20
      - name: Restore and build
        run: dotnet build
      - name: Run Arkade E2E tests
        run: dotnet test NArk.Tests.End2End --no-build --verbosity normal --filter "FullyQualifiedName~Arkade"
        timeout-minutes: 15
      - name: Collect docker logs on failure
        if: failure()
        run: |
          docker logs arkd > /tmp/arkd-logs.txt 2>&1 || true
          docker logs emulator > /tmp/emulator-logs.txt 2>&1 || true
          docker logs solver > /tmp/solver-logs.txt 2>&1 || true
          docker logs solver-init > /tmp/solver-init-logs.txt 2>&1 || true
          docker logs bitcoin > /tmp/bitcoin-logs.txt 2>&1 || true
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: arkade-docker-logs
          path: /tmp/*-logs.txt
      - name: Stop infrastructure
        if: always()
        run: node regtest/regtest.mjs clean || true

  publish:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest
    needs: [build, e2e, e2e-swaps, e2e-recovery, e2e-rotation]
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore NArk.CI.slnf
      - name: Pack
        run: dotnet pack NArk.CI.slnf -c Release -o dist/
      - name: Push to NuGet
        run: dotnet nuget push "dist/*.nupkg" --skip-duplicate -k ${{secrets.NUGET_API_KEY}} -s https://api.nuget.org/v3/index.json
      - name: Tag per NuGet package
        run: |
          for nupkg in dist/*.nupkg; do
            nuspec=$(unzip -p "$nupkg" '*.nuspec')
            package_id=$(echo "$nuspec" | grep -oP '<id>\K[^<]+')
            version=$(echo "$nuspec" | grep -oP '<version>\K[^<]+')
            tag="${package_id}/${version}"
            if git rev-parse "$tag" >/dev/null 2>&1; then
              echo "Tag $tag already exists, skipping"
            else
              echo "Tagging: $tag"
              git tag "$tag"
            fi
          done
          git push origin --tags

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          generate_release_notes: false
