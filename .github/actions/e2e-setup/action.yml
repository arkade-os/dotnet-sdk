name: E2E Setup
description: Checkout, configure .NET + Node, start regtest infrastructure, build

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Start regtest infrastructure
      shell: bash
      run: node regtest/regtest.mjs start --profile boltz,delegate
      timeout-minutes: 20
    - name: Restore and build
      shell: bash
      run: dotnet build
